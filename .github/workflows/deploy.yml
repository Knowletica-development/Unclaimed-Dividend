name: Production Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Context & Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 93.127.206.102 >> ~/.ssh/known_hosts

          # CONNECTING AS ROOT
          ssh -i ~/.ssh/id_rsa root@93.127.206.102 "
            echo 'Connected as root. Initiating deployment...'
            
            # 1️⃣ STEP: Teri asli repo root folder (/root/Unclaimed-Dividend) me jana
            cd /root/Unclaimed-Dividend || exit

            echo '📥 Step 1: Fetching latest code from GitHub...'
            git fetch --all
            git reset --hard origin/main

            echo 'Step 3: Frontend Dependency & Build Generation...'
            cd frontend
            npm ci
            npm run build
            
            echo 'Step 4: Moving Dist/Build folder to Nginx Web Root...'
            mkdir -p /var/www/unclaimed
            rm -rf /var/www/unclaimed/*
            
            if [ -d \"dist\" ]; then
              cp -r dist/* /var/www/unclaimed/
              echo 'Vite dist folder copied to /var/www/unclaimed'
            elif [ -d \"build\" ]; then
              cp -r build/* /var/www/unclaimed/
              echo 'React build folder copied to /var/www/unclaimed'
            fi
            
            echo 'Step 5: Backend Dependency Update...'
            cd ../backend
            npm ci --production
            
            echo 'Step 6: Reloading PM2 Cluster/Process...'
            pm2 restart all

            echo 'Step 7: Nginx Configuration Validation & Reload...'
            nginx -t && systemctl reload nginx

            echo 'Deployment Complete & Live on Nginx!'
          "